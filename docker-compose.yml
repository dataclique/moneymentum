version: '3.8'

services:
  moneymentum:
    build: .
    ports:
      - "8000:8000"  # Backend API
      - "5173:5173"  # Frontend dev server
    volumes:
      - ./data:/app/data
      - ./test_data:/app/test_data
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3 