port = 8000
data_dir = "data"

# ?mode=rwc standa for read/write/create. by setting this flag,
# we make sqlite create the .db file if it doesn't exist
database_url = "sqlite:./moneymentum.db?mode=rwc"

log_level = "debug"

# Ingestion tuning - balance speed vs rate limiting
max_concurrent_requests = 3
max_retries = 5

# Ingestion schedule as a 6-field cron expression
# (sec min hour day-of-month month day-of-week). Hourly, on the hour:
ingestion_schedule = "0 0 * * * *"
