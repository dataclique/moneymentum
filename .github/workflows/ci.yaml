name: CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  id-token: write
  contents: read

jobs:
  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Pre-commit hooks
        # --impure required: devenv devShells use impure features
        run: nix flake check --impure

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build and test
        run: nix build .#moneymentum

      - name: Clippy
        run: nix build .#moneymentum-clippy

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Lint frontend
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run lint"

      - name: Run frontend tests
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run test --run"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build frontend
        run: nix build .#packages.x86_64-linux.frontend

  deploy:
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/fix/broken-cd'
    needs: [hooks, rust, frontend-check, frontend-build]
    concurrency:
      group: deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Flake checks
        # --impure required: devenv devShells use impure features
        run: nix flake check --impure

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve and mask host IP
        run: |
          host_ip=$(nix run .#resolveIp)
          echo "::add-mask::$host_ip"
          host_key=$(nix eval --raw --file keys.nix keys.host)
          echo "$host_ip $host_key" > ~/.ssh/known_hosts

      - name: Deploy
        # --skip-checks: CI jobs above already validate everything
        run: nix run .#deployAll -- --skip-checks
