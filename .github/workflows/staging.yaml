name: Staging

on:
  pull_request:
  merge_group:

permissions:
  id-token: write
  contents: read

jobs:
  staging:
    concurrency:
      # Shared with deploy workflow — deployAll touches staging too
      group: deploy-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Skip on pull request
        if: github.event_name == 'pull_request'
        run: echo "Staging deploy only runs in merge queue"

      - uses: actions/checkout@v4
        if: github.event_name == 'merge_group'
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main
        if: github.event_name == 'merge_group'
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main
        if: github.event_name == 'merge_group'

      - name: Setup SSH
        if: github.event_name == 'merge_group'
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve and mask host IP
        if: github.event_name == 'merge_group'
        run: |
          host_ip=$(nix run .#resolveIp)
          echo "::add-mask::$host_ip"
          echo "HOST_IP=$host_ip" >> "$GITHUB_ENV"
          host_key=$(nix eval --raw --file keys.nix keys.host)
          echo "$host_ip $host_key" > ~/.ssh/known_hosts

      - name: Reset services before deploy
        if: github.event_name == 'merge_group'
        run: |
          ssh "root@$HOST_IP" 'systemctl stop staging || true; systemctl reset-failed staging || true; rm -f /run/moneymentum/staging.ready'

      - name: Check for infra changes
        if: github.event_name == 'merge_group'
        id: infra
        run: |
          base="${{ github.event.merge_group.base_sha }}"
          if git diff --name-only "$base" HEAD | grep -qE '^(os\.nix|services\.nix|deploy\.nix|keys\.nix|infra/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy NixOS
        if: github.event_name == 'merge_group' && steps.infra.outputs.changed == 'true'
        run: nix run .#deployNixos

      - name: Deploy staging service
        if: github.event_name == 'merge_group'
        run: nix run .#deployService -- staging

      - name: Cleanup SSH
        if: always() && github.event_name == 'merge_group'
        run: rm -rf ~/.ssh
