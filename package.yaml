name:                moneymentum
version:             0.1.0.0
github:              "0xgleb/moneymentum"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2024 Author name here"

extra-source-files:
- README.md

description:         Please see the README on GitHub at <https://github.com/0xgleb/moneymentum#readme>

dependencies:
- base >= 4.7 && < 5
- aeson
- bytestring
- cassava
- cassava-conduit
- conduit
- directory
- http-conduit
- protolude
- scientific
- text
- time

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wno-name-shadowing
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

executables:
  moneymentum-exe:
    main:                Quant.hs
    source-dirs:         .
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N

default-extensions:
  - ApplicativeDo
  - BlockArguments
  - ConstraintKinds
  - DeriveGeneric
  - DeriveLift
  - DeriveTraversable # Implies: DeriveFoldable, DeriveFunctor
  - DerivingVia # Implies: DerivingStrategies
  - DuplicateRecordFields
  - FlexibleContexts
  - GADTs
  - GeneralizedNewtypeDeriving
  - ImportQualifiedPost
  - InstanceSigs
  - LambdaCase
  - MultiParamTypeClasses
  - NamedFieldPuns
  - NoImplicitPrelude
  - NoStarIsType
  - NumericUnderscores
  - OverloadedStrings
  - QuasiQuotes
  - RankNTypes # Implies: ExplicitForAll
  - RecordWildCards # Implies: DisambiguateRecordFields
  - ScopedTypeVariables # Implies: ExplicitForAll
  - StandaloneDeriving
  - TupleSections
  - TypeApplications
  - TypeFamilyDependencies # Implies: TypeFamilies
  - DataKinds
  - KindSignatures
  - PolyKinds
  - TypeOperators
  - ViewPatterns
