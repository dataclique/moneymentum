name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Pre-commit hooks
        # Pure flake check — runs the same hooks without the heavy devShell
        run: nix build .#checks.x86_64-linux.git-hooks

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Test
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop --impure -c cargo test -q

      - name: Clippy
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop --impure -c cargo clippy

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Lint
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run lint"

      - name: Test
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run test --run"
