[package]
name = "wallet"
version = "0.1.0"
edition = "2024"

[features]
mock = []
turnkey = [
  "dep:turnkey_client",
  "dep:turnkey_api_key_stamper",
  "dep:alloy-primitives",
]

[dependencies]
async-trait = "0.1"
thiserror = "2"

alloy-primitives = { version = "1.5.7", optional = true, features = ["serde"] }
turnkey_api_key_stamper = { version = "0.6.0", optional = true }
turnkey_client = { version = "0.6.0", optional = true }

[dev-dependencies]
wallet = { path = ".", features = ["mock", "turnkey"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
proptest = "1"
tracing-test = "0.2"
wiremock = "0.6"

[lints]
workspace = true
