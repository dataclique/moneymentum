name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Pre-commit hooks
        # Pure flake check — runs the same hooks without the heavy devShell
        run: nix build .#checks.x86_64-linux.git-hooks

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Test
        run: nix build .#moneymentum-test

  backend-clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Clippy
        # RUSTFLAGS="-D warnings" fails on any warning; clippy adds -D clippy::all
        run: nix build .#moneymentum-clippy

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Lint
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run lint"

      - name: Test
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run test --run"
