name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  id-token: write
  contents: read

jobs:
  hooks:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Pre-commit hooks
        # prek (not pre-commit): git-hooks.nix installs hooks as `prek` to avoid
        # colliding with the pre-commit binary from the pre-commit package.
        run: nix develop --impure -c prek run --all-files

  backend:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build and test
        run: nix build .#moneymentum

      - name: Clippy
        run: nix build .#moneymentum-clippy

  frontend:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Lint
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run lint"

      - name: Test
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run test --run"

      - name: Build
        run: nix build .#packages.x86_64-linux.frontend

  # Runs in parallel with CI jobs to warm the GH Actions cache with NixOS
  # system closure paths. By the time deploy starts, most paths are cached.
  deploy-prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Flake checks
        # --impure required: devenv devShells use impure features
        run: nix flake check --impure

      - name: Build NixOS system closure
        run: nix build .#nixosConfigurations.moneymentum.config.system.build.toplevel

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: [deploy-prep]
    concurrency:
      group: deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve and mask host IP
        run: |
          host_ip=$(nix run .#resolveIp)
          echo "::add-mask::$host_ip"
          host_key=$(nix eval --raw --file keys.nix keys.host)
          echo "$host_ip $host_key" > ~/.ssh/known_hosts

      - name: Deploy
        # --skip-checks: CI jobs above already validate everything
        run: nix run .#deployAll -- --skip-checks

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_ed25519

  deploy-staging:
    if: github.event_name == 'pull_request'
    needs: [hooks, backend, frontend, deploy-prep]
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            accept-flake-config = true
            fallback = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resolve and mask host IP
        run: |
          host_ip=$(nix run .#resolveIp)
          echo "::add-mask::$host_ip"
          host_key=$(nix eval --raw --file keys.nix keys.host)
          echo "$host_ip $host_key" > ~/.ssh/known_hosts

      - name: Deploy system config
        run: nix run .#deployNixos -- --skip-checks

      - name: Deploy staging service
        run: nix run .#deployService -- staging --skip-checks

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/id_ed25519
