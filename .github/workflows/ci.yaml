name: CI
on: [push]

concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  id-token: write
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build and test
        run: nix build .#moneymentum

      - name: Clippy
        run: nix build .#moneymentum-clippy

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Lint frontend
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run lint"

      - name: Run frontend tests
        # --impure required: devenv uses impure features for caching and local state
        run: nix develop .#frontend --impure -c bash -c "cd frontend && bun run test --run"

  flake-check:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Flake checks
        # --impure required: devenv devShells use impure features
        run: nix flake check --impure
